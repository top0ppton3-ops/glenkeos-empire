                    $ref: '#/components/schemas/RiskEvent'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /risk/events/{id}:
    parameters:
      - $ref: '#/components/parameters/RiskEventIdParam'
    get:
      summary: Get risk event by ID
      tags: [Risk]
      operationId: getRiskEvent
      responses:
        '200':
          description: Risk event details
          content:
            application/json:
              schema:
