openapi: 3.0.3
info:
  title: GlenKeos API
  version: 1.0.0
  description: |
    Complete REST API for GlenKeos multi-entity restaurant and delivery ecosystem.

    ## Authentication
    All endpoints require JWT bearer token authentication except public endpoints.

    ## Rate Limiting
    - Public API: 100 requests/minute
    - Internal API: 1000 requests/minute

    ## Error Handling
    All errors follow standard HTTP status codes with JSON error responses.

  contact:
    name: GlenKeos API Support
    email: api@glenkeos.com
  license:
    name: Proprietary

servers:
  - url: https://api.glenkeos.com/api/v1
    description: Production API
  - url: https://api.glenkeos.com/internal/api/v1
    description: Internal API
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Stores
    description: Store management operations
  - name: Orders
    description: Order lifecycle management
  - name: Inventory
    description: Inventory tracking and management
  - name: Drivers
    description: Driver operations and tracking
  - name: Staff
    description: Staff and authentication management
  - name: Policies
    description: Governance and compliance policies
  - name: Risk
    description: Risk event monitoring
  - name: Compliance
    description: Compliance audit trail
  - name: Metrics
    description: Operational metrics and analytics

paths:
  /stores:
    get:
      summary: List stores
      tags: [Stores]
      operationId: listStores
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, MAINTENANCE]
      responses:
        '200':
          description: List of stores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Store'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create store
      tags: [Stores]
      operationId: createStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '201':
          description: Store created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /stores/{id}:
    parameters:
      - $ref: '#/components/parameters/StoreIdParam'
    get:
      summary: Get store by ID
      tags: [Stores]
      operationId: getStore
      responses:
        '200':
          description: Store details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Store'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update store
      tags: [Stores]
      operationId: updateStore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStoreRequest'
      responses:
        '200':
          description: Store updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Store'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders:
    get:
      summary: List orders
      tags: [Orders]
      operationId: listOrders
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: storeId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: customerId
          in: query
          schema:
            type: string
        - name: driverId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create order
      tags: [Orders]
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /orders/{id}:
    parameters:
      - $ref: '#/components/parameters/OrderIdParam'
    get:
      summary: Get order by ID
      tags: [Orders]
      operationId: getOrder
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
