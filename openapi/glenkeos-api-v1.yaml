  /risk/events:
    get:
      summary: List risk events
      tags: [Risk]
      operationId: listRiskEvents
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: severity
          in: query
          schema:
            type: string
            enum: [LOW, MEDIUM, HIGH, CRITICAL]
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, IN_REVIEW, MITIGATED, RESOLVED, ESCALATED]
        - name: category
          in: query
          schema:
            type: string
      responses:
