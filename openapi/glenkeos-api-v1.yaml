            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [ONLINE, OFFLINE, BUSY, ON_BREAK, INACTIVE]
                reason:
                  type: string
      responses:
        '200':
          description: Driver status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /staff:
    get:
      summary: List staff
      tags: [Staff]
      operationId: listStaff
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: role
          in: query
          schema:
            type: string
        - name: storeId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of staff
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
